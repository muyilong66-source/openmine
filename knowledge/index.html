    <style>
        :root { --text:#1a1a2e; --muted:#5c5c6f; --primary:#0d6efd; --bg:#f8fafc; }

        body { margin:0; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); line-height:1.65; background:var(--bg); }

        .card-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:12px; }
        .card-list a { display:block; padding:18px 20px; background:#fff; border:1px solid #e2e8f0; border-radius:14px; color:var(--text); text-decoration:none; font-weight:600; box-shadow:0 4px 20px rgba(15,23,42,.06); transition: border-color .2s, box-shadow .2s; }
        .card-list a:hover { border-color:rgba(13,110,253,.4); box-shadow:0 8px 28px rgba(13,110,253,.12); color:var(--primary); }
        .card-list span { display:block; font-weight:400; font-size:.85rem; color:var(--muted); margin-top:6px; }
    </style>
</head>
