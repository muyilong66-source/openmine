<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>形变监测类 · 配套监测设备</title>
    <style>
        :root { --text:#1a1a2e; --muted:#5c5c6f; --primary:#0d6efd; --bg:#f8fafc; }

        body { margin:0; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); line-height:1.65; background:var(--bg); }
        .topbar { background:#fff; border-bottom:1px solid #e2e8f0; padding:16px clamp(16px,4vw,48px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
        .topbar a { color:var(--primary); font-weight:600; text-decoration:none; }
        .wrap { max-width:800px; margin:0 auto; padding:40px 20px 72px; }
        h1 { margin:0 0 8px; font-size:1.45rem; }
        .loc { color:var(--muted); margin:0 0 24px; font-size:.92rem; }
        .loc strong { color:var(--primary); }
        h2 { font-size:1.05rem; margin:22px 0 10px; padding-left:12px; border-left:4px solid var(--primary); }
        p { margin:0 0 10px; font-size:.9rem; color:var(--muted); }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="../index.html">← 返回首页</a>
        <a href="index.html">设备总览</a>
    </header>
    <main class="wrap">
        <h1>形变监测类</h1>
        <p class="loc"><strong>定位：</strong>地表与浅表几何量监测，是边坡整体运动态势的直接依据。</p>

        <h2>GNSS 高精度接收机</h2>
        <p>毫米级定位能力，支持全天候表面位移监测，可与基准站差分组网。</p>

        <h2>测量机器人</h2>
        <p>免棱镜自动全站仪，实现多点、高频扫描与周期复测，适合工作帮与重点棱镜阵。</p>

        <h2>裂缝计与伸缩仪</h2>
        <p>针对拉张裂缝、错台等部位的开合度直接测量，可与 GNSS 成果互为补充。</p>
    </main>
